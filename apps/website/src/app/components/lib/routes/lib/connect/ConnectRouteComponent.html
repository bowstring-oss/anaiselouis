<bowstring--flexbox-container>
  <bowstring--aside>
    <bowstring--flexbox-container>
      <bowstring--box>
        <bowstring--header fontSizeExponent="-2">
          @if (messageFormGroup.disabled) {<h3 i18n="@@apps--Website--Components--Routes--Home--Aside--Header_1">We'll be in touch{{ ellipsesService.ellipses$() }}</h3>} @else {<h3 i18n="@@apps--Website--Components--Routes--Home--Aside--Header_2">Want to connect?</h3>}
        </bowstring--header>
        <bowstring--form (output)="messageFormSubmit()">
          <bowstring--text-field-input
            autocomplete="name"
            enterKeyHint="next"
            [formControl]="messageFormGroup.controls.name"
            i18n-label
            label="name"
            level="2"
            (nextFocused)="messageTextFieldInput.focus();" />
          <bowstring--text-field-input #messageTextFieldInput
            enterKeyHint="next"
            [formControl]="messageFormGroup.controls.message"
            i18n-label
            label="message"
            level="2"
            (nextFocused)="emailTextFieldInput.focus();" />
          <bowstring--text-field-input #emailTextFieldInput
            autocomplete="email"
            enterKeyHint="next"
            [formControl]="messageFormGroup.controls.email"
            i18n-label
            label="email"
            level="2"
            (nextFocused)="countryCodePickerInputComponent.focus();"
            type="email" />
          <bowstring--flexbox-container
            alignItems="flex-end"
            flexDirection="row">
            <bowstring--picker-input #countryCodePickerInputComponent
              autocomplete="tel-country-code"
              enterKeyHint="next"
              explicitAutocomplete
              [formControl]="messageFormGroup.controls.phone.controls.countryCallingCode"
              flexBasis="calc(1rem * pow(var(--phi), 4))"
              flexGrow="1"
              i18n-label
              label="country code"
              level="2"
              (nextFocused)="phoneNumberFieldInputComponent.focus();">
              @for (countryCallingCode of countryCallingCodes; track $index) {<bowstring--option [label]="'+' + countryCallingCode" [value]="countryCallingCode" />}
            </bowstring--picker-input>
            <bowstring--phone-number-field-input #phoneNumberFieldInputComponent
              [countryCallingCode]="messageFormGroup.controls.phone.controls.countryCallingCode.value"
              [formControl]="messageFormGroup.controls.phone.controls.nationalNumber"
              flexBasis="calc(1rem * pow(var(--phi), 5))"
              flexGrow="1.6180339887"
              i18n-label
              label="phone number"
              level="2" />
          </bowstring--flexbox-container>
          <bowstring--divider />
          <bowstring--flexbox-container
            flexDirection="row"
            justifyContent="flex-end">
            <bowstring--button
              appearance="symbol"
              [disabled]="!authenticationService.user$() || messageFormGroup.disabled || messageFormGroup.invalid || messagesFormWorking$()"
              type="submit">
              <bowstring--symbol input="ArrowUpCircleFill" />
            </bowstring--button>
          </bowstring--flexbox-container>
        </bowstring--form>
      </bowstring--box>
    </bowstring--flexbox-container>
  </bowstring--aside>
  <bowstring--section />
</bowstring--flexbox-container>
